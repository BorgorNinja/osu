name: Build Android APK

on:
  push:
    branches: [ master ]
  release:
    types: [ published ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-android-apk:
    name: Build Android APK
    runs-on: windows-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: microsoft
          java-version: 17

      - name: Install .NET 8.0.x
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Install Android workload
        run: dotnet workload install android

      - name: Restore packages
        run: dotnet restore osu.Android.slnf

      - name: Set version string
        id: version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            VERSION="${{ github.event.release.tag_name }}"
          else
            VERSION="0.0.0-$(date +'%Y%m%d')-${{ github.run_number }}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Build Debug APK
        run: >
          dotnet build
          -c Release
          osu.Android.slnf
          /p:Version=${{ steps.version.outputs.version }}
          /p:ApplicationDisplayVersion=${{ steps.version.outputs.version }}
          -o artifacts

      - name: Locate APK
        id: locate
        shell: bash
        run: |
          APK=$(find . -name "*.apk" -not -path "*/obj/*" | head -1)
          echo "apk_path=$APK" >> $GITHUB_OUTPUT
          echo "Found APK: $APK"

      - name: Rename APK
        shell: bash
        run: |
          mv "${{ steps.locate.outputs.apk_path }}" "osu-lazer-android-${{ steps.version.outputs.version }}.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: osu-android-${{ steps.version.outputs.version }}
          path: osu-lazer-android-*.apk
          retention-days: 30

      - name: Attach APK to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: osu-lazer-android-*.apk
